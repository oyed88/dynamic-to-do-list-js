<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dynamic To-Do List</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>To-Do List</h1>

    <form id="task-form" class="task-form" aria-label="Add task">
      <input id="task-input" type="text" placeholder="Add a new task..." autocomplete="off" />
      <!-- NOTE: id must match the JS selection (addButton) -->
      <button id="add-button" type="button">Add</button>
    </form>

    <section class="tasks-section">
      <ul id="task-list" class="task-list" aria-live="polite"></ul>
    </section>

    <footer class="footer">
      <button id="clear-all" type="button">Clear All</button>
      <span id="task-count">0 tasks</span>
    </footer>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
